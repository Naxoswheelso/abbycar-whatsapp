<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Abby Car - WhatsApp Tool</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{--green:#25D366;--gd:#1eb85a;--blue:#0C447C;--bl:#E6F1FB;--teal:#27500A;--tl:#EAF3DE;--wb:#FFF8E6;--wbr:#F0C040;--wt:#7A5500;--sb:#EAFAF1;--sbr:#27AE60;--st:#1D6A3A;--db:#FDECEA;--dbr:#E24B4A;--dt:#8B1A1A;--bg:#F7F7F8;--brd:#E5E5E5;--txt:#1A1A1A;--t2:#6B6B6B;--r:10px;--rs:6px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--txt);}
.hdr{background:#fff;border-bottom:1px solid var(--brd);padding:14px 20px;display:flex;align-items:center;gap:10px;}
.hdr h1{font-size:17px;font-weight:600;}
.hdr p{font-size:12px;color:var(--t2);}
.wrap{max-width:700px;margin:0 auto;padding:20px 14px;}
.up{border:2px dashed var(--brd);border-radius:var(--r);padding:28px 20px;text-align:center;cursor:pointer;background:#fff;margin-bottom:20px;transition:.2s;}
.up:hover,.up.drag{border-color:var(--green);background:#F0FDF4;}
.up input{display:none;}
.up h3{font-size:15px;font-weight:500;margin:8px 0 4px;}
.up p{font-size:13px;color:var(--t2);}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px;}
.stat{background:#fff;border:1px solid var(--brd);border-radius:var(--r);padding:12px;text-align:center;}
.sn{font-size:26px;font-weight:600;}
.sl{font-size:12px;color:var(--t2);margin-top:2px;}
.sec{font-size:11px;font-weight:600;color:var(--t2);letter-spacing:.07em;text-transform:uppercase;margin:18px 0 8px;}
.card{background:#fff;border:1px solid var(--brd);border-radius:var(--r);padding:12px 14px;margin-bottom:8px;transition:opacity .2s;}
.card.done{opacity:.4;}
.ct{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px;flex-wrap:wrap;gap:5px;}
.cn{font-weight:600;font-size:14px;}
.badge{font-size:11px;padding:2px 10px;border-radius:20px;font-weight:600;}
.bp{background:var(--bl);color:var(--blue);}
.ba{background:var(--tl);color:var(--teal);}
.meta{font-size:12px;color:var(--t2);margin-bottom:8px;font-family:monospace;}
.msg{background:var(--bg);border-radius:var(--rs);padding:9px 12px;font-size:12px;line-height:1.7;white-space:pre-wrap;margin-bottom:10px;border:1px solid var(--brd);}
.acts{display:flex;gap:6px;flex-wrap:wrap;}
.btn{padding:7px 12px;border-radius:var(--rs);font-size:12px;cursor:pointer;border:1px solid var(--brd);background:#fff;color:var(--txt);font-weight:500;}
.btn:hover{background:var(--bg);}
.bwa{background:var(--green);color:#fff;border-color:var(--green);font-weight:600;text-decoration:none;display:inline-block;padding:7px 12px;border-radius:var(--rs);font-size:12px;}
.bwa:hover{background:var(--gd);}
.bok{background:var(--sb);color:var(--st);border-color:var(--sbr);}
.bno{background:var(--db);color:var(--dt);border-color:var(--dbr);}
.warn{background:var(--wb);border:1px solid var(--wbr);border-radius:var(--rs);padding:10px 12px;margin-bottom:10px;font-size:12px;}
.wt{font-weight:600;color:var(--wt);margin-bottom:5px;}
.wm{color:var(--txt);margin-bottom:8px;line-height:1.5;}
.fr{display:flex;gap:6px;align-items:center;margin-top:5px;}
.fr input{flex:1;padding:6px 9px;font-size:12px;border-radius:var(--rs);border:1px solid var(--brd);background:#fff;color:var(--txt);font-family:monospace;}
.ok{background:var(--sb);border:1px solid var(--sbr);border-radius:var(--rs);padding:7px 10px;font-size:12px;color:var(--st);margin-bottom:10px;font-weight:500;}
.bar{position:sticky;bottom:0;background:#fff;border-top:1px solid var(--brd);padding:10px 14px;display:flex;align-items:center;justify-content:space-between;margin-top:20px;}
.pr{font-size:12px;color:var(--t2);}
.err{background:var(--db);border:1px solid var(--dbr);border-radius:var(--r);padding:12px;font-size:13px;color:var(--dt);margin-bottom:14px;}
.fi{font-size:12px;color:var(--st);background:var(--sb);border-radius:var(--rs);padding:5px 10px;display:inline-block;margin-bottom:14px;border:1px solid var(--sbr);}
</style>
</head>
<body>
<div class="hdr">
  <div style="font-size:20px">&#x1F697;</div>
  <div><h1>Abby Car &mdash; WhatsApp Tool</h1><p>Upload Reservations Journal (.xlsx)</p></div>
</div>
<div class="wrap">
  <div class="up" id="up" onclick="document.getElementById('fi').click()"
    ondragover="event.preventDefault();this.classList.add('drag')"
    ondragleave="this.classList.remove('drag')"
    ondrop="onDrop(event)">
    <input type="file" id="fi" accept=".xlsx,.xls" onchange="onFile(event)"/>
    <div style="font-size:28px">&#x1F4CA;</div>
    <h3>Upload Excel from Wheelso</h3>
    <p>Click or drag .xlsx file here</p>
  </div>
  <div id="fi2"></div>
  <div id="err"></div>
  <div id="stats" style="display:none">
    <div class="stats">
      <div class="stat"><div class="sn" id="st">0</div><div class="sl">Total</div></div>
      <div class="stat"><div class="sn" style="color:#27AE60" id="sf">0</div><div class="sl">Found</div></div>
      <div class="stat"><div class="sn" style="color:#E24B4A" id="sn2">0</div><div class="sl">Not found</div></div>
    </div>
  </div>
  <div id="list"></div>
  <div class="bar" id="bar" style="display:none">
    <span class="pr" id="pr">0 completed</span>
    <button class="btn" onclick="expCSV()">&#x2B07; Export CSV</button>
  </div>
</div>
<script>

const PE="Hello%20NAMEPLACEHOLDER%20from%20Abby%20Car%20%F0%9F%9A%97%E2%98%80%EF%B8%8F%0ATo%20get%20your%20car%20ready%2C%20please%20reply%20with%3A%0A%E2%80%A2%20Ferry%2Fboat%20name%20and%20arrival%20time%0A%0APickup%20is%20at%20our%20office%20%28a%20short%2C%20easy%20walk%20from%20the%20port%29%3A%0A%F0%9F%93%8D%20Office%20location%3A%20https%3A%2F%2Fmaps.app.goo.gl%2FWaCNMPVDFQZeFGNV8%0A%E2%9E%A1%EF%B8%8F%20Best%20walking%20route%20from%20the%20port%3A%20https%3A%2F%2Fmaps.app.goo.gl%2FecDhc1aAghmEsyDaA%0A%0APlease%20bring%20the%20main%20driver%27s%3A%0A%E2%80%A2%20Passport%20or%20ID%0A%E2%80%A2%20Driver%27s%20license%0A%E2%80%A2%20Credit%20card%0A%28all%20documents%20have%20to%20be%20in%20original%20physical%20form%20and%20under%20the%20main%20driver%27s%20name%29.%0A%0AYour%20rental%20voucher%20%28digital%20is%20fine%29%0A%0AMessage%20or%20call%20us%20anytime%E2%80%94happy%20to%20help%21%0A%E2%80%94%20Abby%20Car%2C%20Naxos%20%F0%9F%8F%9D%EF%B8%8F";
const AE="Hello%20NAMEPLACEHOLDER%20from%20Abby%20Car%20%F0%9F%9A%97%E2%98%80%EF%B8%8F%0AWe%20hope%20you%27re%20excited%20for%20your%20trip%20to%20Naxos%21%20To%20better%20prepare%20your%20car%20rental%2C%20could%20you%20please%20let%20us%20know%3A%0A%E2%9C%88%EF%B8%8F%20Which%20flight%20number%20will%20you%20be%20arriving%20with%20tomorrow%3F%0AThis%20helps%20us%20ensure%20a%20smooth%20pickup%20for%20you.%0AThank%20you%20and%20safe%20travels%21%0A%E2%80%93%20Abby%20Car%2C%20Naxos";

function buildMsg(enc,name){return decodeURIComponent(enc.replace('NAMEPLACEHOLDER',encodeURIComponent(name)));}
function buildWA(enc,phone,name){return'https://wa.me/'+phone+'?text='+enc.replace('NAMEPLACEHOLDER',encodeURIComponent(name));}

const CC=[
  {c:'1',n:'USA/Canada',min:10,max:10},{c:'30',n:'Greece',min:10,max:10},
  {c:'31',n:'Netherlands',min:9,max:9},{c:'32',n:'Belgium',min:8,max:9},
  {c:'33',n:'France',min:9,max:9},{c:'34',n:'Spain',min:9,max:9},
  {c:'357',n:'Cyprus',min:8,max:8},{c:'39',n:'Italy',min:9,max:10},
  {c:'40',n:'Romania',min:9,max:9},{c:'41',n:'Switzerland',min:9,max:9},
  {c:'43',n:'Austria',min:7,max:13},{c:'44',n:'UK',min:10,max:10},
  {c:'45',n:'Denmark',min:8,max:8},{c:'46',n:'Sweden',min:7,max:9},
  {c:'47',n:'Norway',min:8,max:8},{c:'48',n:'Poland',min:9,max:9},
  {c:'49',n:'Germany',min:10,max:11},{c:'351',n:'Portugal',min:9,max:9},
  {c:'353',n:'Ireland',min:9,max:9},{c:'358',n:'Finland',min:9,max:10},
  {c:'36',n:'Hungary',min:9,max:9},{c:'380',n:'Ukraine',min:9,max:9},
  {c:'385',n:'Croatia',min:8,max:9},{c:'420',n:'Czech Rep.',min:9,max:9},
  {c:'7',n:'Russia',min:10,max:10},{c:'90',n:'Turkey',min:10,max:10},
  {c:'971',n:'UAE',min:9,max:9},{c:'972',n:'Israel',min:9,max:9},
  {c:'995',n:'Georgia',min:9,max:9},{c:'61',n:'Australia',min:9,max:9},
  {c:'86',n:'China',min:11,max:11},{c:'91',n:'India',min:10,max:10},
];

function cleanP(r){
  if(!r)return'';
  return String(r).replace(/[\s\-\(\)\.]/g,'').replace(/^00/,'').replace(/^\+/,'');
}

function analyzeP(raw){
  if(!raw||!String(raw).trim())return{ok:false,issues:['No phone number.'],suggestions:[]};
  const d=cleanP(raw);
  const sorted=[...CC].sort((a,b)=>b.c.length-a.c.length);
  let det=null;
  for(const c of sorted){
    if(d.startsWith(c.c)){
      const loc=d.slice(c.c.length);
      const lc=loc.startsWith('0')?loc.slice(1):loc;
      det={...c,loc,lc,valid:lc.length>=c.min&&lc.length<=c.max};
      break;
    }
  }
  if(det){
    if(det.loc.startsWith('0')&&det.lc.length>=det.min&&det.lc.length<=det.max)
      return{ok:false,issues:['+'+det.c+' ('+det.n+'): local number starts with 0.'],suggestions:[{label:'Remove leading 0 ('+det.n+')',phone:det.c+det.lc}],phone:d};
    if(det.valid)return{ok:true,phone:det.c+det.lc};
    const issues=['+'+det.c+' ('+det.n+'): '+det.loc.length+' digits (expected '+det.min+'-'+det.max+').'];
    const sugg=[];
    if(det.loc.length>det.max){
      sugg.push({label:'Last '+det.max+' digits',phone:det.c+det.loc.slice(det.loc.length-det.max)});
      sugg.push({label:'First '+det.max+' digits',phone:det.c+det.loc.slice(0,det.max)});
    }
    return{ok:false,issues,suggestions:sugg,phone:d};
  }
  const sugg=[];
  if(d.length===10&&d.startsWith('6'))sugg.push({label:'Greek mobile (+30)',phone:'30'+d});
  return{ok:false,issues:['Unknown country code.'],suggestions:sugg,phone:d};
}

let custs=[],status={},corr={};

function onDrop(e){e.preventDefault();document.getElementById('up').classList.remove('drag');const f=e.dataTransfer.files[0];if(f)processFile(f);}
function onFile(e){if(e.target.files[0])processFile(e.target.files[0]);}

function processFile(file){
  document.getElementById('err').innerHTML='';
  document.getElementById('fi2').innerHTML='<div class="fi">&#x1F4C4; '+file.name+'</div>';
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const wb=XLSX.read(e.target.result,{type:'array',cellStyles:false});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const rows=XLSX.utils.sheet_to_json(ws,{defval:''});
      parseRows(rows);
    }catch(err){
      showErr('Cannot read file: '+err.message);
    }
  };
  reader.readAsArrayBuffer(file);
}

function parseRows(rows){
  custs=[];status={};corr={};
  if(!rows.length){showErr('Empty file.');return;}
  const k=Object.keys(rows[0]);
  const lk=k.find(x=>/check.out.location/i.test(x));
  const nk=k.find(x=>/^driver$/i.test(x)||(/driver/i.test(x)&&!/phone|email|country|tax|loyal/i.test(x)));
  const pk=k.find(x=>/driver.?phone/i.test(x));
  const rk=k.find(x=>/res.?no|agr.?no/i.test(x));
  if(!lk||!nk||!pk){showErr('Wrong columns. Make sure this is the Reservations Journal from Wheelso.');return;}
  rows.forEach(r=>{
    const loc=String(r[lk]||'').trim();
    if(loc!=='Port'&&loc!=='Airport')return;
    const name=String(r[nk]||'').trim();
    const phone=String(r[pk]||'').trim();
    const res=String(r[rk]||'').trim();
    if(!name||name==='Total')return;
    const analysis=analyzeP(phone);
    custs.push({name,phone,res,type:loc.toLowerCase(),analysis,cp:analysis.phone||cleanP(phone)});
  });
  if(!custs.length){showErr('No Port or Airport reservations found.');return;}
  document.getElementById('st').textContent=custs.length;
  document.getElementById('stats').style.display='block';
  document.getElementById('bar').style.display='flex';
  render();
}

function gp(c){return corr[c.res]||c.cp;}
function fn(n){const p=n.trim().split(/\s+/);return p[0].charAt(0).toUpperCase()+p[0].slice(1).toLowerCase();}

function render(){
  const ports=custs.filter(c=>c.type==='port');
  const apts=custs.filter(c=>c.type==='airport');
  let h='';
  if(ports.length){h+='<div class="sec">Port ('+ports.length+')</div>';ports.forEach(c=>h+=card(c));}
  if(apts.length){h+='<div class="sec">Airport ('+apts.length+')</div>';apts.forEach(c=>h+=card(c));}
  document.getElementById('list').innerHTML=h;
  updStats();
}

function card(c){
  const ph=gp(c);
  const ra=corr[c.res]?analyzeP('+'+corr[c.res]):c.analysis;
  const msg=buildMsg(c.type==='port'?PE:AE,fn(c.name));
  const wa=buildWA(c.type==='port'?PE:AE,ph,fn(c.name));
  const s=status[c.res];
  const rid=c.res.replace(/[^a-z0-9]/gi,'');
  let pb='';
  if(corr[c.res]){
    pb='<div class="ok">&#x2713; Corrected to +'+ph+'</div>';
  }else if(!ra.ok){
    const sh=ra.suggestions.map((sg,i)=>'<div style="margin-bottom:6px"><div style="font-size:11px;color:#666;margin-bottom:3px">'+sg.label+':</div><div class="fr"><input type="text" id="s'+rid+i+'" value="+'+sg.phone+'"/><button class="btn" onclick="applyP(\'' +c.res+ '\',\'s'+rid+i+'\')">Apply</button></div></div>').join('');
    pb='<div class="warn"><div class="wt">&#x26A0; Possible wrong number</div><div class="wm">'+ra.issues.join(' ')+'</div>'+sh+'<div style="border-top:1px solid var(--wbr);padding-top:8px;margin-top:6px"><div style="font-size:11px;color:#666;margin-bottom:3px">Or type manually:</div><div class="fr"><input type="text" id="m'+rid+'" value="+'+ph+'"/><button class="btn" onclick="applyP(\'' +c.res+ '\',\'m'+rid+'\')">Apply</button></div></div></div>';
  }
  return '<div class="card '+(s?'done':'')+'"><div class="ct"><span class="cn">'+c.name+'</span><span class="badge '+(c.type==='port'?'bp':'ba')+'">'+(c.type==='port'?'Port':'Airport')+'</span></div><div class="meta">+'+ph+' &middot; '+c.res+'</div>'+pb+'<div class="msg">'+msg+'</div><div class="acts"><a class="bwa" href="'+wa+'" target="_blank">WhatsApp</a><button class="btn '+(s==='found'?'bok':'')+'" onclick="mark(\'' +c.res+ '\',\'found\')">&#x2713; Found</button><button class="btn '+(s==='notfound'?'bno':'')+'" onclick="mark(\'' +c.res+ '\',\'notfound\')">&#x2717; Not found</button></div></div>';
}

function applyP(res,id){corr[res]=document.getElementById(id).value.replace(/[\s\-\+\(\)]/g,'');render();}
function mark(res,v){status[res]=v;render();}
function showErr(m){document.getElementById('list').innerHTML='';document.getElementById('err').innerHTML='<div class="err">'+m+'</div>';document.getElementById('stats').style.display='none';document.getElementById('bar').style.display='none';}
function updStats(){
  const f=Object.values(status).filter(v=>v==='found').length;
  const n=Object.values(status).filter(v=>v==='notfound').length;
  document.getElementById('sf').textContent=f;
  document.getElementById('sn2').textContent=n;
  document.getElementById('pr').textContent=(f+n)+' / '+custs.length+' completed';
}
function expCSV(){
  const nf=custs.filter(c=>status[c.res]==='notfound');
  if(!nf.length){alert('No not-found entries.');return;}
  const rows=[['Name','Phone','Type','Reservation']];
  nf.forEach(c=>rows.push([c.name,'+'+gp(c),c.type,c.res]));
  const csv=rows.map(r=>r.map(v=>'"'+v+'"').join(',')).join('\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'}));
  a.download='not_found.csv';a.click();
}
</script>
</body>
</html>
