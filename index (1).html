<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Abby Car &#x2014; WhatsApp Tool</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
:root {
  --green:#25D366;--green-dark:#1eb85a;--blue:#0C447C;--blue-light:#E6F1FB;
  --teal:#27500A;--teal-light:#EAF3DE;--warn-bg:#FFF8E6;--warn-border:#F0C040;
  --warn-text:#7A5500;--success-bg:#EAFAF1;--success-border:#27AE60;
  --success-text:#1D6A3A;--danger-bg:#FDECEA;--danger-border:#E24B4A;
  --danger-text:#8B1A1A;--bg:#F7F7F8;--card:#FFFFFF;--border:#E5E5E5;
  --text:#1A1A1A;--text2:#6B6B6B;--r:10px;--rs:6px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.header{background:#fff;border-bottom:1px solid var(--border);padding:16px 24px;display:flex;align-items:center;gap:12px;}
.header h1{font-size:18px;font-weight:600;}
.header p{font-size:13px;color:var(--text2);}
.container{max-width:720px;margin:0 auto;padding:24px 16px;}
.upload-area{border:2px dashed var(--border);border-radius:var(--r);padding:2rem;text-align:center;cursor:pointer;background:#fff;transition:border-color .2s,background .2s;margin-bottom:24px;}
.upload-area:hover,.upload-area.drag{border-color:var(--green);background:#F0FDF4;}
.upload-area input{display:none;}
.upload-icon{font-size:32px;margin-bottom:8px;}
.upload-area h3{font-size:15px;font-weight:500;margin-bottom:4px;}
.upload-area p{font-size:13px;color:var(--text2);}
.file-types{display:flex;gap:8px;justify-content:center;margin-top:12px;}
.ft-badge{font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;border:1px solid var(--border);color:var(--text2);}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:24px;}
.stat{background:#fff;border:1px solid var(--border);border-radius:var(--r);padding:14px;text-align:center;}
.stat-num{font-size:28px;font-weight:600;}
.stat-label{font-size:12px;color:var(--text2);margin-top:2px;}
.section-label{font-size:11px;font-weight:600;color:var(--text2);letter-spacing:.07em;text-transform:uppercase;margin:20px 0 10px;}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;margin-bottom:10px;transition:opacity .2s;}
.card.done{opacity:.4;}
.card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;flex-wrap:wrap;gap:6px;}
.cname{font-weight:600;font-size:15px;}
.badge{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:600;}
.bp{background:var(--blue-light);color:var(--blue);}
.ba{background:var(--teal-light);color:var(--teal);}
.meta{font-size:13px;color:var(--text2);margin-bottom:10px;font-family:monospace;}
.msg-box{background:var(--bg);border-radius:var(--rs);padding:10px 14px;font-size:13px;line-height:1.7;white-space:pre-wrap;margin-bottom:12px;border:1px solid var(--border);}
.actions{display:flex;gap:8px;flex-wrap:wrap;}
.btn{padding:8px 14px;border-radius:var(--rs);font-size:13px;cursor:pointer;border:1px solid var(--border);background:#fff;color:var(--text);font-weight:500;transition:background .15s;}
.btn:hover{background:var(--bg);}
.btn-wa{background:var(--green);color:#fff;border-color:var(--green);font-weight:600;text-decoration:none;display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:var(--rs);font-size:13px;}
.btn-wa:hover{background:var(--green-dark);}
.btn-ok{background:var(--success-bg);color:var(--success-text);border-color:var(--success-border);}
.btn-no{background:var(--danger-bg);color:var(--danger-text);border-color:var(--danger-border);}
.warn-box{background:var(--warn-bg);border:1px solid var(--warn-border);border-radius:var(--rs);padding:12px 14px;margin-bottom:12px;font-size:13px;}
.warn-title{font-weight:600;color:var(--warn-text);margin-bottom:6px;}
.warn-text{color:var(--text);margin-bottom:10px;line-height:1.5;}
.fix-row{display:flex;gap:8px;align-items:center;margin-top:6px;}
.fix-row input{flex:1;padding:7px 10px;font-size:13px;border-radius:var(--rs);border:1px solid var(--border);background:#fff;color:var(--text);font-family:monospace;}
.success-note{background:var(--success-bg);border:1px solid var(--success-border);border-radius:var(--rs);padding:8px 12px;font-size:13px;color:var(--success-text);margin-bottom:12px;font-weight:500;}
.bottom-bar{position:sticky;bottom:0;background:#fff;border-top:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;margin-top:24px;}
.prog{font-size:13px;color:var(--text2);}
.error-msg{background:var(--danger-bg);border:1px solid var(--danger-border);border-radius:var(--r);padding:14px;font-size:14px;color:var(--danger-text);margin-bottom:16px;}
.file-info{font-size:13px;color:var(--success-text);background:var(--success-bg);border-radius:var(--rs);padding:6px 12px;display:inline-block;margin-bottom:16px;border:1px solid var(--success-border);}
.loading{text-align:center;padding:2rem;color:var(--text2);font-size:14px;}
</style>
</head>
<body>
<div class="header">
  <div style="font-size:22px">&#x1F697;</div>
  <div>
    <h1>Abby Car &#x2014; WhatsApp Tool</h1>
    <p>&#913;&#957;&#941;&#946;&#945;&#963;&#949; &#964;&#959; Reservations Journal (.xlsx &#942; .pdf)</p>
  </div>
</div>
<div class="container">
  <div class="upload-area" id="uploadArea"
    onclick="document.getElementById('fileInput').click()"
    ondragover="event.preventDefault();this.classList.add('drag')"
    ondragleave="this.classList.remove('drag')"
    ondrop="handleDrop(event)">
    <input type="file" id="fileInput" accept=".xlsx,.xls,.pdf" onchange="handleFile(event)"/>
    <div class="upload-icon">&#x1F4C2;</div>
    <h3>&#913;&#957;&#941;&#946;&#945;&#963;&#949; &#964;&#959; Excel &#942; PDF &#945;&#960;&#972; &#964;&#959; Wheelso</h3>
    <p>&#922;&#940;&#957;&#949; &#954;&#955;&#953;&#954; &#942; &#963;&#973;&#961;&#949; &#964;&#959; &#945;&#961;&#967;&#949;&#943;&#959; &#949;&#948;&#974;</p>
    <div class="file-types">
      <span class="ft-badge">&#x1F4CA; .xlsx</span>
      <span class="ft-badge">&#x1F4CB; .xls</span>
      <span class="ft-badge">&#x1F4C4; .pdf</span>
    </div>
  </div>
  <div id="fileInfo"></div>
  <div id="errorMsg"></div>
  <div id="statsArea" style="display:none">
    <div class="stats">
      <div class="stat"><div class="stat-num" id="sTotal">0</div><div class="stat-label">&#931;&#973;&#957;&#959;&#955;&#959;</div></div>
      <div class="stat"><div class="stat-num" style="color:#27AE60" id="sFound">0</div><div class="stat-label">&#914;&#961;&#941;&#952;&#951;&#954;&#945;&#957;</div></div>
      <div class="stat"><div class="stat-num" style="color:#E24B4A" id="sNF">0</div><div class="stat-label">&#916;&#949;&#957; &#946;&#961;&#941;&#952;&#951;&#954;&#945;&#957;</div></div>
    </div>
  </div>
  <div id="list"></div>
  <div class="bottom-bar" id="bottomBar" style="display:none">
    <span class="prog" id="prog">0 &#959;&#955;&#959;&#954;&#955;&#951;&#961;&#969;&#956;&#941;&#957;&#959;&#953;</span>
    <button class="btn" onclick="exportCSV()">&#x2B07; Export CSV</button>
  </div>
</div>
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

const PORT_ENCODED="Hello%20NAMEPLACEHOLDER%20from%20Abby%20Car%20%F0%9F%9A%97%E2%98%80%EF%B8%8F%0ATo%20get%20your%20car%20ready%2C%20please%20reply%20with%3A%0A%E2%80%A2%20Ferry%2Fboat%20name%20and%20arrival%20time%0A%0APickup%20is%20at%20our%20office%20%28a%20short%2C%20easy%20walk%20from%20the%20port%29%3A%0A%F0%9F%93%8D%20Office%20location%3A%20https%3A%2F%2Fmaps.app.goo.gl%2FWaCNMPVDFQZeFGNV8%0A%E2%9E%A1%EF%B8%8F%20Best%20walking%20route%20from%20the%20port%3A%20https%3A%2F%2Fmaps.app.goo.gl%2FecDhc1aAghmEsyDaA%0A%0APlease%20bring%20the%20main%20driver%27s%3A%0A%E2%80%A2%20Passport%20or%20ID%0A%E2%80%A2%20Driver%27s%20license%0A%E2%80%A2%20Credit%20card%0A%28all%20documents%20have%20to%20be%20in%20original%20physical%20form%20and%20under%20the%20main%20driver%27s%20name%29.%0A%0AYour%20rental%20voucher%20%28digital%20is%20fine%29%0A%0AMessage%20or%20call%20us%20anytime%E2%80%94happy%20to%20help%21%0A%E2%80%94%20Abby%20Car%2C%20Naxos%20%F0%9F%8F%9D%EF%B8%8F";
const AIRPORT_ENCODED="Hello%20NAMEPLACEHOLDER%20from%20Abby%20Car%20%F0%9F%9A%97%E2%98%80%EF%B8%8F%0AWe%20hope%20you%27re%20excited%20for%20your%20trip%20to%20Naxos%21%20To%20better%20prepare%20your%20car%20rental%2C%20could%20you%20please%20let%20us%20know%3A%0A%E2%9C%88%EF%B8%8F%20Which%20flight%20number%20will%20you%20be%20arriving%20with%20tomorrow%3F%0AThis%20helps%20us%20ensure%20a%20smooth%20pickup%20for%20you.%0AThank%20you%20and%20safe%20travels%21%0A%E2%80%93%20Abby%20Car%2C%20Naxos";
const PORT_MSG=n=>decodeURIComponent(PORT_ENCODED.replace("NAMEPLACEHOLDER",encodeURIComponent(n)));
const AIRPORT_MSG=n=>decodeURIComponent(AIRPORT_ENCODED.replace("NAMEPLACEHOLDER",encodeURIComponent(n)));
const PORT_WA=(phone,n)=>"https://wa.me/"+phone+"?text="+PORT_ENCODED.replace("NAMEPLACEHOLDER",encodeURIComponent(n));
const AIRPORT_WA=(phone,n)=>"https://wa.me/"+phone+"?text="+AIRPORT_ENCODED.replace("NAMEPLACEHOLDER",encodeURIComponent(n));

const CC=[
  {code:'1',name:'USA/Canada',min:10,max:10},{code:'30',name:'Greece',min:10,max:10},
  {code:'31',name:'Netherlands',min:9,max:9},{code:'32',name:'Belgium',min:8,max:9},
  {code:'33',name:'France',min:9,max:9},{code:'34',name:'Spain',min:9,max:9},
  {code:'357',name:'Cyprus',min:8,max:8},{code:'39',name:'Italy',min:9,max:10},
  {code:'40',name:'Romania',min:9,max:9},{code:'41',name:'Switzerland',min:9,max:9},
  {code:'43',name:'Austria',min:7,max:13},{code:'44',name:'UK',min:10,max:10},
  {code:'45',name:'Denmark',min:8,max:8},{code:'46',name:'Sweden',min:7,max:9},
  {code:'47',name:'Norway',min:8,max:8},{code:'48',name:'Poland',min:9,max:9},
  {code:'49',name:'Germany',min:10,max:11},{code:'351',name:'Portugal',min:9,max:9},
  {code:'353',name:'Ireland',min:9,max:9},{code:'358',name:'Finland',min:9,max:10},
  {code:'36',name:'Hungary',min:9,max:9},{code:'380',name:'Ukraine',min:9,max:9},
  {code:'385',name:'Croatia',min:8,max:9},{code:'420',name:'Czech Rep.',min:9,max:9},
  {code:'7',name:'Russia',min:10,max:10},{code:'90',name:'Turkey',min:10,max:10},
  {code:'971',name:'UAE',min:9,max:9},{code:'972',name:'Israel',min:9,max:9},
  {code:'995',name:'Georgia',min:9,max:9},{code:'61',name:'Australia',min:9,max:9},
  {code:'86',name:'China',min:11,max:11},{code:'91',name:'India',min:10,max:10},
];

function cleanPhone(raw){
  if(!raw)return'';
  return String(raw).replace(/[\s\-\(\)\.]/g,'').replace(/^00/,'').replace(/^\+/,'');
}
function detectCC(digits){
  const sorted=[...CC].sort((a,b)=>b.code.length-a.code.length);
  for(const c of sorted){
    if(digits.startsWith(c.code)){
      const local=digits.slice(c.code.length);
      const lc=local.startsWith('0')?local.slice(1):local;
      return{...c,local,lc,valid:lc.length>=c.min&&lc.length<=c.max};
    }
  }
  return null;
}
function analyzePhone(raw){
  if(!raw||String(raw).trim()==='')return{ok:false,empty:true,issues:['&#916;&#949;&#957; &#965;&#960;&#940;&#961;&#967;&#949;&#953; &#964;&#951;&#955;&#941;&#966;&#969;&#957;&#959;.'],suggestions:[]};
  const digits=cleanPhone(raw);
  const d=detectCC(digits);
  const issues=[],sugg=[];
  if(d){
    if(d.local.startsWith('0')&&d.lc.length>=d.min&&d.lc.length<=d.max){
      sugg.push({label:'&#913;&#966;&#945;&#943;&#961;&#949;&#963;&#949; &#964;&#959; &#956;&#951;&#948;&#941;&#957; ('+d.name+')',phone:d.code+d.lc});
      issues.push('+'+d.code+' ('+d.name+'): &#964;&#959;&#960;&#953;&#954;&#972;&#962; &#945;&#961;. &#945;&#961;&#967;&#943;&#950;&#949;&#953; &#956;&#949; 0.');
      return{ok:false,issues,suggestions:sugg,phone:digits};
    }
    if(d.valid)return{ok:true,phone:d.code+d.lc};
    issues.push('+'+d.code+' ('+d.name+'): '+d.local.length+' &#968;&#951;&#966;&#943;&#945; (&#945;&#957;&#945;&#956;&#941;&#957;&#959;&#957;&#964;&#945;&#953; '+d.min+'&#8211;'+d.max+').');
    if(d.local.length>d.max){
      sugg.push({label:'&#932;&#949;&#955;&#949;&#965;&#964;&#945;&#943;&#945; '+d.max+' &#968;&#951;&#966;&#943;&#945;',phone:d.code+d.local.slice(d.local.length-d.max)});
      sugg.push({label:'&#928;&#961;&#974;&#964;&#945; '+d.max+' &#968;&#951;&#966;&#943;&#945;',phone:d.code+d.local.slice(0,d.max)});
    }
  }else{
    issues.push('&#913;&#947;&#957;&#974;&#963;&#964;&#959;&#962; &#954;&#969;&#948;&#953;&#954;&#972;&#962; &#967;&#974;&#961;&#945;&#962;.');
    if(digits.length===10&&(digits.startsWith('69')||digits.startsWith('6')))
      sugg.push({label:'&#917;&#955;&#955;&#951;&#957;&#953;&#954;&#972; (+30)',phone:'30'+digits});
  }
  return{ok:false,issues,suggestions:sugg,phone:digits};
}

let customers=[],status={},corrected={};

function handleDrop(e){
  e.preventDefault();
  document.getElementById('uploadArea').classList.remove('drag');
  const f=e.dataTransfer.files[0];
  if(f)processFile(f);
}
function handleFile(e){if(e.target.files[0])processFile(e.target.files[0]);}

function processFile(file){
  document.getElementById('errorMsg').innerHTML='';
  document.getElementById('fileInfo').innerHTML='<div class="file-info">&#x1F4C4; '+file.name+'</div>';
  document.getElementById('list').innerHTML='<div class="loading">&#916;&#953;&#945;&#946;&#940;&#950;&#969; &#964;&#959; &#945;&#961;&#967;&#949;&#943;&#959;...</div>';
  const ext=file.name.split('.').pop().toLowerCase();
  const reader=new FileReader();
  if(ext==='pdf'){
    reader.onload=e=>parsePDF(e.target.result);
    reader.readAsArrayBuffer(file);
  }else{
    reader.onload=e=>{
      try{
        // Try with cellStyles false to handle read-only files
        const wb=XLSX.read(e.target.result,{type:'array',cellStyles:false,sheetStubs:true});
        const ws=wb.Sheets[wb.SheetNames[0]];
        const rows=XLSX.utils.sheet_to_json(ws,{defval:''});
        parseRows(rows);
      }catch(err){
        // Second attempt with different options for read-only files
        try{
          const wb=XLSX.read(e.target.result,{type:'array',password:'',cellStyles:false});
          const ws=wb.Sheets[wb.SheetNames[0]];
          const rows=XLSX.utils.sheet_to_json(ws,{defval:''});
          parseRows(rows);
        }catch(err2){
          showError('&#931;&#966;&#940;&#955;&#956;&#945; &#945;&#957;&#940;&#947;&#957;&#969;&#963;&#951;&#962; &#945;&#961;&#967;&#949;&#943;&#959;&#965;. &#916;&#959;&#954;&#943;&#956;&#945;&#963;&#949; "Save as copy" &#963;&#964;&#959; Android.');
        }
      }
    };
    reader.readAsArrayBuffer(file);
  }
}

async function parsePDF(arrayBuffer){
  try{
    const pdf=await pdfjsLib.getDocument({data:arrayBuffer}).promise;
    let fullText='';
    for(let i=1;i<=pdf.numPages;i++){
      const page=await pdf.getPage(i);
      const content=await page.getTextContent();
      // Get items with their positions for better parsing
      const items=content.items;
      fullText+=items.map(item=>item.str).join(' ')+'
';
    }
    parsePDFText(fullText);
  }catch(e){
    showError('&#931;&#966;&#940;&#955;&#956;&#945; &#945;&#957;&#940;&#947;&#957;&#969;&#963;&#951;&#962; PDF.');
  }
}

function parsePDFText(text){
  customers=[];status={};corrected={};
  // Parse rows by splitting on reservation numbers
  const rows=text.split(/(?=NAXR[A-Z]+-\d+)/g).filter(r=>r.trim());
  rows.forEach(row=>{
    const locPort=/Port/.test(row);
    const locAirport=/Airport/.test(row);
    if(!locPort&&!locAirport)return;
    const resMatch=row.match(/NAX(?:RNT|RES)-\d+/);
    const phoneMatch=row.match(/[+]?(?:\d[\s\-]?){9,15}/g);
    const nameMatches=row.match(/[A-Z][a-z]+(?:\s+[A-Z][a-z]+)+|[A-Z]{2,}(?:\s+[A-Z]{2,})+/g);
    const skipWords=['NAXOS','NAXRNT','NAXRES','PORT','AIRPORT','PETROL','MANUAL','AUTOMATIC','GREEN','VILLAGE','OFFICE','BLUE','STAR','SKYWARPEL','TRADING','LIMITED','WALK','DESK','ATHENS','CHAMPIONS','LEAGUE','CHAMPION','SKOPELITIS','SUPERRUNNER','EUROCHAMPION','CARTPREP','DYSNORFD','ABBYPN','WISECARS','VIPPOA','BKGGRPRE','ORBITPOA','DISCOVRY','CARDLMUS'];
    let name='';
    if(nameMatches){
      const filtered=nameMatches.filter(n=>!skipWords.includes(n.trim())&&n.trim().length>3);
      if(filtered.length)name=filtered[0];
    }
    if(!name||!phoneMatch)return;
    const phone=phoneMatch.find(p=>p.replace(/\D/g,'').length>=9)||'';
    const cleanPh=phone.replace(/[\s\-]/g,'');
    const loc=locAirport?'airport':'port';
    const res=resMatch?resMatch[0]:'RES-'+Math.random().toString(36).slice(2,6);
    const analysis=analyzePhone(cleanPh);
    customers.push({name:toTitle(name),phone:cleanPh,res,type:loc,analysis,cleanPhone:analysis.phone||cleanPhone(cleanPh)});
  });
  if(customers.length===0){showError('&#916;&#949;&#957; &#946;&#961;&#941;&#952;&#951;&#954;&#945;&#957; &#954;&#961;&#945;&#964;&#942;&#963;&#949;&#953;&#962; Port/Airport &#963;&#964;&#959; PDF.');return;}
  showCustomers();
}

function toTitle(s){
  return s.toLowerCase().split(' ').map(w=>w?w[0].toUpperCase()+w.slice(1):'').join(' ');
}

function parseRows(rows){
  customers=[];status={};corrected={};
  if(!rows.length){showError('&#932;&#959; &#945;&#961;&#967;&#949;&#943;&#959; &#949;&#943;&#957;&#945;&#953; &#940;&#948;&#949;&#953;&#959;.');return;}
  const keys=Object.keys(rows[0]);
  const locKey=keys.find(k=>/check.out.location/i.test(k));
  const nameKey=keys.find(k=>/^driver$/i.test(k)||(/driver/i.test(k)&&!/phone|email|country|tax|loyal/i.test(k)));
  const phoneKey=keys.find(k=>/driver.phone/i.test(k));
  const resKey=keys.find(k=>/res.no/i.test(k)||/agr.no/i.test(k));
  if(!locKey||!nameKey||!phoneKey){
    showError('&#916;&#949;&#957; &#946;&#961;&#941;&#952;&#951;&#954;&#945;&#957; &#959;&#953; &#963;&#969;&#963;&#964;&#941;&#962; &#963;&#964;&#942;&#955;&#949;&#962;. &#914;&#949;&#946;&#945;&#953;&#974;&#963;&#959;&#965; &#972;&#964;&#953; &#945;&#957;&#949;&#946;&#940;&#950;&#949;&#953;&#962; Reservations Journal &#945;&#960;&#972; &#964;&#959; Wheelso.');
    return;
  }
  rows.forEach(r=>{
    const loc=String(r[locKey]||'').trim();
    if(loc!=='Port'&&loc!=='Airport')return;
    const name=String(r[nameKey]||'').trim();
    const phone=String(r[phoneKey]||'').trim();
    const res=String(r[resKey]||'').trim();
    if(!name||name==='Total')return;
    const analysis=analyzePhone(phone);
    customers.push({name,phone,res,type:loc.toLowerCase(),analysis,cleanPhone:analysis.phone||cleanPhone(phone)});
  });
  if(customers.length===0){showError('&#916;&#949;&#957; &#946;&#961;&#941;&#952;&#951;&#954;&#945;&#957; &#954;&#961;&#945;&#964;&#942;&#963;&#949;&#953;&#962; Port &#942; Airport.');return;}
  showCustomers();
}

function showCustomers(){
  document.getElementById('sTotal').textContent=customers.length;
  document.getElementById('statsArea').style.display='block';
  document.getElementById('bottomBar').style.display='flex';
  render();
}

function showError(msg){
  document.getElementById('list').innerHTML='';
  document.getElementById('errorMsg').innerHTML='<div class="error-msg">'+msg+'</div>';
  document.getElementById('statsArea').style.display='none';
  document.getElementById('bottomBar').style.display='none';
}

function getPhone(c){return corrected[c.res]||c.cleanPhone;}
function firstName(n){const p=n.trim().split(/\s+/);return p[0].charAt(0).toUpperCase()+p[0].slice(1).toLowerCase();}

function render(){
  const ports=customers.filter(c=>c.type==='port');
  const airports=customers.filter(c=>c.type==='airport');
  let html='';
  if(ports.length){html+='<div class="section-label">Port ('+ports.length+')</div>';ports.forEach(c=>html+=card(c));}
  if(airports.length){html+='<div class="section-label">Airport ('+airports.length+')</div>';airports.forEach(c=>html+=card(c));}
  document.getElementById('list').innerHTML=html;
  updateStats();
}

function card(c){
  const ph=getPhone(c);
  const ra=corrected[c.res]?analyzePhone('+'+corrected[c.res]):c.analysis;
  const msg=c.type==='port'?PORT_MSG(firstName(c.name)):AIRPORT_MSG(firstName(c.name));
  const waUrl=c.type==='port'?PORT_WA(ph,firstName(c.name)):AIRPORT_WA(ph,firstName(c.name));
  const s=status[c.res];
  let phoneBlock='';
  if(corrected[c.res]){
    phoneBlock='<div class="success-note">&#x2713; &#916;&#953;&#959;&#961;&#952;&#974;&#952;&#951;&#954;&#949; &#963;&#949; +'+ph+'</div>';
  }else if(!ra.ok){
    const sugHtml=ra.suggestions.map((sg,i)=>'<div style="margin-bottom:8px"><div style="font-size:12px;color:#666;margin-bottom:4px">'+sg.label+':</div><div class="fix-row"><input type="text" id="sg-'+c.res+'-'+i+'" value="+'+sg.phone+'"/><button class="btn" onclick="applyPhone(''+c.res+'',document.getElementById('sg-'+c.res+'-'+i+'').value)">&#917;&#966;&#940;&#961;&#956;&#959;&#963;&#949;</button></div></div>').join('');
    phoneBlock='<div class="warn-box"><div class="warn-title">&#x26A0;&#xFE0F; &#928;&#953;&#952;&#945;&#957;&#972; &#955;&#940;&#952;&#959;&#962; &#945;&#961;&#953;&#952;&#956;&#972;&#962;</div><div class="warn-text">'+ra.issues.join(' ')+'</div>'+sugHtml+'<div style="border-top:1px solid var(--warn-border);padding-top:10px;margin-top:8px"><div style="font-size:12px;color:#666;margin-bottom:4px">&#935;&#949;&#953;&#961;&#959;&#954;&#943;&#957;&#951;&#964;&#951;:</div><div class="fix-row"><input type="text" id="man-'+c.res+'" value="+'+ph+'"/><button class="btn" onclick="applyPhone(''+c.res+'',document.getElementById('man-'+c.res+'').value)">&#917;&#966;&#940;&#961;&#956;&#959;&#963;&#949;</button></div></div></div>';
  }
  return '<div class="card '+(s?'done':'')+'"><div class="card-top"><span class="cname">'+c.name+'</span><span class="badge '+(c.type==='port'?'bp':'ba')+'">'+(c.type==='port'?'Port':'Airport')+'</span></div><div class="meta">+'+ph+' &nbsp;&middot;&nbsp; '+c.res+'</div>'+phoneBlock+'<div class="msg-box">'+msg.replace(/
/g,'<br>')+'</div><div class="actions"><a class="btn-wa" href="'+waUrl+'" target="_blank">&#x1F4AC; WhatsApp</a><button class="btn '+(s==='found'?'btn-ok':'')+'" onclick="mark(''+c.res+'','found')">&#x2713; &#914;&#961;&#941;&#952;&#951;&#954;&#949;</button><button class="btn '+(s==='notfound'?'btn-no':'')+'" onclick="mark(''+c.res+'','notfound')">&#x2717; &#916;&#949;&#957; &#946;&#961;&#941;&#952;&#951;&#954;&#949;</button></div></div>';
}

function applyPhone(res,val){corrected[res]=val.replace(/[\s\-\+\(\)]/g,'');render();}
function mark(res,val){status[res]=val;render();}

function updateStats(){
  const f=Object.values(status).filter(v=>v==='found').length;
  const n=Object.values(status).filter(v=>v==='notfound').length;
  document.getElementById('sFound').textContent=f;
  document.getElementById('sNF').textContent=n;
  document.getElementById('prog').textContent=(f+n)+' / '+customers.length+' &#959;&#955;&#959;&#954;&#955;&#951;&#961;&#969;&#956;&#941;&#957;&#959;&#953;';
}

function exportCSV(){
  const nf=customers.filter(c=>status[c.res]==='notfound');
  if(!nf.length){alert('&#916;&#949;&#957; &#965;&#960;&#940;&#961;&#967;&#959;&#965;&#957; "&#916;&#949;&#957; &#946;&#961;&#941;&#952;&#951;&#954;&#945;&#957;" &#947;&#953;&#945; export.');return;}
  const rows=[['Onoma','Tilefono','Typos','Kratisi']];
  nf.forEach(c=>rows.push([c.name,'+'+getPhone(c),c.type,c.res]));
  const csv=rows.map(r=>r.map(v=>'"'+v+'"').join(',')).join('
');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8;'}));
  a.download='not_found_whatsapp.csv';a.click();
}
</script>
